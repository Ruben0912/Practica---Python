<html>
<head>
<style>
table, td, th {

  font-family: Arial, sans-serif;
  font-size: 20px;
  font-weight: normal;
}

table {
  border-collapse: not-collapse;
  width: auto;
}

td {
  height: auto;
  vertical-align: bottom;
}
</style>
</head>
<body>



<table>
  <tr>
    <th>Quick</th>
    <th colspan="2">brown fox</th>
    <th>Jump</th>
  </tr>
  <tr>
     <th rowspan="3">over the</th>
    <td>lazy</td>
    <td>dog</td>
    <td>and</td>
  </tr>
  <tr>
    <td>then</td>
    <td>it</td>
    <td>fall</td>
  </tr>
  <tr>
    <th colspan="4">prey to a hunter</th>
  </tr>
 
</table>

</body>
</html>
